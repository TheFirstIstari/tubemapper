name: build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

env:
  SERVER_URL: http://frobinson.local:3000

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze

  android:
    name: android-apk
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Build APK
        run: flutter build apk --debug --dart-define=SERVER_URL=${{ env.SERVER_URL }}
      - uses: actions/upload-artifact@v4
        with:
          name: tubemapper-android-debug
          path: mobile/build/app/outputs/flutter-apk/*.apk

  ios:
    name: ios-debug
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Build iOS (debug)
        run: flutter build ios --debug --no-codesign --dart-define=SERVER_URL=${{ env.SERVER_URL }}
      - uses: actions/upload-artifact@v4
        with:
          name: tubemapper-ios-debug
          path: mobile/build/ios/iphoneos/Runner.app

  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [android, ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: tubemapper-*
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: TubeMapper ${{ github.ref_name }}
          body: |
            ## TubeMapper ${{ github.ref_name }}
            APK and iOS build attached.
          files: |
            *.apk
            Runner.app
          generate_release_notes: true
